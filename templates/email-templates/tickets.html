<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#060404;font-family:'Segoe UI',Tahoma,sans-serif;">
  <div style="max-width:520px;margin:40px auto;padding:32px;background:#111;border-radius:16px;border:1px solid rgba(255,255,255,0.08);">
    <div style="text-align:center;margin-bottom:24px;">
      <span style="font-size:24px;font-weight:900;color:#d33131;letter-spacing:3px;">CINEMALAB</span>
    </div>
    <h2 style="color:#f1eeef;margin:0 0 8px;font-size:20px;">Ваші квитки, {{userName}}!</h2>
    <p style="color:rgba(241,238,239,0.6);font-size:14px;line-height:1.6;margin:0 0 24px;">
      Дякуємо за покупку. Замовлення <strong style="color:white">{{orderNumber}}</strong> успішно оформлено.
    </p>
    <div style="background:#1a1a1a;border-radius:12px;padding:20px;margin-bottom:24px;border:1px solid rgba(255,255,255,0.05);">
        <h3 style="color:#f1eeef;margin:0 0 12px;font-size:18px;">{{movieTitle}}</h3>
        <p style="color:rgba(241,238,239,0.6);font-size:14px;margin:0 0 8px;"><strong>Час:</strong> {{startTime}}</p>
        <p style="color:rgba(241,238,239,0.6);font-size:14px;margin:0 0 16px;"><strong>Зал:</strong> {{hallName}}</p>
        
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="text-align:left;color:rgba(241,238,239,0.4);font-size:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);">Ряд, Місце</th>
                    <th style="text-align:right;color:rgba(241,238,239,0.4);font-size:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);">Код квитка</th>
                </tr>
            </thead>
            <tbody>
                {{ticketsHtml}}
            </tbody>
        </table>
    </div>
    
    <p style="color:rgba(241,238,239,0.3);font-size:12px;text-align:center;margin:0;">
      Пред'явіть цей код/квиток при вході до залу. Приємного перегляду!
    </p>

    <div style="text-align:center;margin-top:24px;">
      <a href="{{profileUrl}}" style="display:inline-block;padding:12px 32px;background:#d33131;color:#f1eeef;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px;">
        Переглянути мої квитки
      </a>
    </div>
  </div>
</body>
</html>
